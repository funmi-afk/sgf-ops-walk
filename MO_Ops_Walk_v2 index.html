<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missouri Ops Walk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#0f1117;--ink2:#3d4152;--ink3:#8b8fa8;
    --surface:#ffffff;--surface2:#f5f5f7;--surface3:#eeeef2;
    --green:#1a7a4a;--green-bg:#e8f5ee;
    --amber:#a05a00;--amber-bg:#fff3e0;
    --red:#b92d2d;--red-bg:#fdeaea;
    --blue:#1a5fbf;--blue-bg:#e8effc;
    --border:#e2e2e8;
    --ff:'DM Sans',sans-serif;
    --mono:'DM Mono',monospace;
  }
  body{font-family:var(--ff);background:#0f1117;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

  /* NAV */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:#0f1117;border-bottom:0.5px solid #1e2130;flex-shrink:0}
  .nav-left{display:flex;align-items:center;gap:12px}
  .nav-logo{width:32px;height:32px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff}
  .nav-title{font-size:14px;font-weight:600;color:#fff}
  .nav-sub{font-size:11px;color:#8b96b0;margin-top:1px}
  .nav-right{display:flex;align-items:center;gap:10px}
  .live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,0.2);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(74,222,128,0.2)}50%{box-shadow:0 0 0 5px rgba(74,222,128,0.1)}}
  .live-lbl{font-size:11px;color:#8b96b0}
  .date-lbl{font-size:11px;color:#8b96b0;font-family:var(--mono);padding-left:10px;border-left:0.5px solid #2a2e3d}

  /* PROGRESS */
  .progress-wrap{padding:16px 28px 0;background:#0f1117;flex-shrink:0}
  .progress-track{display:flex;gap:6px;margin-bottom:8px}
  .progress-seg{flex:1;height:3px;border-radius:2px;background:#1e2130;cursor:pointer;transition:background 0.3s}
  .progress-seg.done{background:#378ADD}
  .progress-seg.active{background:#fff}
  .progress-seg.future{background:linear-gradient(90deg,#7c3aed,#2563eb)}
  .progress-seg.future.active{background:linear-gradient(90deg,#a78bfa,#60a5fa)}
  .station-labels{display:flex;gap:6px}
  .station-lbl{flex:1;font-size:10px;font-weight:500;color:#3d4560;cursor:pointer;transition:color 0.2s;text-align:center;padding-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .station-lbl.active{color:#fff}
  .station-lbl.done{color:#378ADD}
  .station-lbl.future-lbl{color:#6d28d9}
  .station-lbl.future-lbl.active{color:#c4b5fd}

  /* STAGE */
  .stage{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:20px 28px 0;background:#0f1117;overflow-y:auto}
  .station-card{width:100%;max-width:940px;background:var(--surface);border-radius:16px;padding:28px 32px;animation:slidein 0.35s ease;margin-bottom:20px}
  .station-card.future-card{background:#0f0f1a;border:0.5px solid #2d1f6e;color:#e2e8f0}
  @keyframes slidein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* STATION HEADER */
  .st-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;padding-bottom:22px;border-bottom:0.5px solid var(--border)}
  .future-card .st-header{border-bottom-color:#2d1f6e}
  .st-eyebrow{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
  .future-card .st-eyebrow{color:#7c3aed}
  .st-title{font-size:24px;font-weight:500;letter-spacing:-0.02em;color:var(--ink);margin-bottom:8px}
  .future-card .st-title{color:#f1f5f9}
  .st-desc{font-size:13px;color:var(--ink2);line-height:1.65;max-width:600px}
  .future-card .st-desc{color:#94a3b8}
  .st-icon{font-size:36px;margin-left:20px;flex-shrink:0}

  /* SHARED */
  .inner-card{background:var(--surface2);border-radius:10px;padding:14px 16px;margin-bottom:10px}
  .inner-card:last-child{margin-bottom:0}
  .future-inner{background:#161628;border:0.5px solid #2d1f6e;border-radius:10px;padding:14px 16px;margin-bottom:10px}
  .future-inner:last-child{margin-bottom:0}
  .ic-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
  .fi-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#7c3aed;margin-bottom:10px}

  /* KPI */
  .metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .metric{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;text-align:center}
  .metric-val{font-size:26px;font-weight:300;letter-spacing:-0.04em;font-family:var(--mono)}
  .metric-lbl{font-size:11px;color:var(--ink3);margin-top:5px}
  .metric-delta{font-size:10px;font-weight:500;margin-top:6px;display:inline-flex;padding:2px 7px;border-radius:20px}

  /* LEADERBOARD */
  .lb-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:0.5px solid var(--border)}
  .lb-row:last-child{border-bottom:none}
  .lb-rank{font-size:11px;font-family:var(--mono);color:var(--ink3);width:18px;text-align:right;flex-shrink:0}
  .av{width:28px;height:28px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .lb-name{font-size:13px;font-weight:500;flex:1;color:var(--ink)}
  .lb-bar-bg{flex:1;max-width:100px;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
  .lb-bar{height:100%;border-radius:3px}
  .lb-pct{font-size:12px;font-weight:600;font-family:var(--mono);min-width:40px;text-align:right}
  .summit{font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px;background:#fff8e0;color:#8a6200;border:0.5px solid #f0c040}

  /* COACHING */
  .cq-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:0.5px solid var(--border)}
  .cq-row:last-child{border-bottom:none}
  .cq-ch{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px}
  .ch-s{background:#e3faf0;color:#0d6e3a}
  .ch-z{background:#e8effc;color:#1a5fbf}
  .ch-t{background:#fff3e0;color:#a05a00}
  .cq-agent{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px}
  .cq-issue{font-size:11px;color:var(--ink2);margin-top:2px}
  .occ{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px}
  .occ1{background:var(--green-bg);color:var(--green)}
  .occ2{background:var(--amber-bg);color:var(--amber)}
  .occ3{background:var(--red-bg);color:var(--red)}

  /* BARS */
  .bars-wrap{display:flex;gap:8px;align-items:flex-end;height:80px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .bar-v{font-size:10px;font-family:var(--mono);color:var(--ink3);font-weight:500}
  .bar-b{width:100%;border-radius:3px 3px 0 0}
  .bar-l{font-size:10px;color:var(--ink3)}

  /* TABLES */
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{text-align:left;padding:6px 7px;color:var(--ink3);font-size:10px;letter-spacing:0.06em;border-bottom:0.5px solid var(--border);font-weight:600;text-transform:uppercase}
  .tbl td{padding:7px 7px;border-bottom:0.5px solid var(--border);color:var(--ink)}
  .tbl td.mono{font-family:var(--mono);font-size:11px}
  .tbl tr:last-child td{border-bottom:none}

  /* PILLS */
  .pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
  .pill-g{background:var(--green-bg);color:var(--green)}
  .pill-a{background:var(--amber-bg);color:var(--amber)}
  .pill-r{background:var(--red-bg);color:var(--red)}
  .pill-b{background:var(--blue-bg);color:var(--blue)}
  .pill-v{background:#ede9fe;color:#6d28d9}

  .divider{height:0.5px;background:var(--border);margin:14px 0}
  .fdivider{height:0.5px;background:#2d1f6e;margin:14px 0}

  /* TWO COL */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

  /* COACHING STATS */
  .cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .cs-item{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:10px;text-align:center}
  .cs-val{font-size:22px;font-weight:300;font-family:var(--mono);color:var(--ink)}
  .cs-lbl{font-size:10px;color:var(--ink3);margin-top:3px}

  /* FUTURE STATE SPECIFIC */
  .pillar{background:#0a0a1a;border:0.5px solid #2d1f6e;border-radius:12px;padding:20px;position:relative;overflow:hidden}
  .pillar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .pillar-coaching::before{background:linear-gradient(90deg,#2563eb,#7c3aed)}
  .pillar-rigor::before{background:linear-gradient(90deg,#7c3aed,#db2777)}
  .pillar-ideation::before{background:linear-gradient(90deg,#db2777,#ea580c)}
  .pillar-num{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
  .pillar-title{font-size:16px;font-weight:600;margin-bottom:6px}
  .pillar-sub{font-size:11px;color:#94a3b8;line-height:1.6;margin-bottom:14px}

  .compare-row{margin-bottom:10px;padding:10px 12px;border-radius:8px}
  .compare-now{background:#1a1a2e;border:0.5px solid #2d2d4e}
  .compare-future{background:#0d1f0d;border:0.5px solid #1a3d1a}
  .compare-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px}
  .now-label{color:#4a5568}
  .future-label{color:#16a34a}
  .compare-text{font-size:12px;line-height:1.6;color:#cbd5e1}
  .compare-future .compare-text{color:#bbf7d0}

  .timeline-strip{display:flex;gap:0;margin:16px 0;position:relative}
  .timeline-strip::before{content:'';position:absolute;top:15px;left:0;right:0;height:1px;background:linear-gradient(90deg,#2d1f6e,#7c3aed,#2563eb);z-index:0}
  .tl-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1}
  .tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:2px solid}
  .tl-dot-now{background:#0f1117;border-color:#4a5568;color:#6b7280}
  .tl-dot-active{background:#1e1b4b;border-color:#7c3aed;color:#c4b5fd}
  .tl-dot-future{background:#0f1117;border-color:#2d1f6e;color:#4c1d95}
  .tl-label{font-size:10px;text-align:center;color:#94a3b8;line-height:1.4}
  .tl-label strong{color:#e2e8f0;display:block;font-size:11px}

  .outlier-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid #2d1f6e}
  .outlier-row:last-child{border-bottom:none}
  .outlier-tag{font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .tag-risk{background:#2d0707;color:#fca5a5;border:0.5px solid #7f1d1d}
  .tag-manage{background:#1a2d07;color:#86efac;border:0.5px solid #14532d}
  .tag-watch{background:#2d1f07;color:#fcd34d;border:0.5px solid #78350f}
  .outlier-name{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:2px}
  .outlier-detail{font-size:11px;color:#64748b}

  /* FOOTER */
  .footer{padding:18px 28px 22px;background:#0f1117;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;border-top:0.5px solid #1e2130}
  .footer-station{font-size:11px;color:#8b96b0;font-family:var(--mono)}
  .key-hint{font-size:10px;color:#3d4560;display:flex;gap:8px;align-items:center;margin-top:5px}
  .key{padding:2px 6px;border:0.5px solid #2a2e3d;border-radius:4px;font-family:var(--mono);font-size:10px;color:#5d6480}
  .btn-row{display:flex;gap:10px}
  .btn{padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--ff);transition:all 0.15s}
  .btn-ghost{background:transparent;border:0.5px solid #2a2e3d;color:#8b96b0}
  .btn-ghost:hover{border-color:#4a5068;color:#fff}
  .btn-primary{background:#1a5fbf;color:#fff}
  .btn-primary:hover{background:#1a50a8}
  .btn-future{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff}
  .btn-future:hover{opacity:0.9}
  .btn:disabled{opacity:0.3;cursor:default}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-left">
    <div class="nav-logo">MO</div>
    <div>
      <div class="nav-title">Missouri Operations Walk</div>
      <div class="nav-sub">Lilly Voice &nbsp;·&nbsp; GiftHealth Program</div>
    </div>
  </div>
  <div class="nav-right">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="live-dot"></div>
      <span class="live-lbl">Live</span>
    </div>
    <span class="date-lbl" id="dateLabel"></span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track" id="progressTrack"></div>
  <div class="station-labels" id="stationLabels"></div>
</div>

<div class="stage">
  <div id="stationCard"></div>
</div>

<div class="footer">
  <div>
    <div class="footer-station" id="footerStation"></div>
    <div class="key-hint">
      <span class="key">←</span><span class="key">→</span> navigate
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="btnBack" onclick="go(-1)">← Back</button>
    <button class="btn btn-primary" id="btnNext" onclick="go(1)">Next →</button>
  </div>
</div>

<script>
const STATIONS = [

  // ─── STATION 1: PERFORMANCE VISIBILITY ───────────────────────────────────
  {
    future: false,
    icon: "📊",
    eyebrow: "Station 1 of 4 · Daily rhythm",
    title: "Performance Visibility",
    shortLabel: "Performance",
    desc: "Every shift starts the same way — Ops manager refreshes dashboard with yesterday's data from Assembled, distributes to team leads, team leads push to their teams on Slack. Highlights show: team stats, shout outs, flags. The leaderboard tells each agent exactly where they stand.",
    render: () => `
      <div class="two-col">
        <div>
          
            <div class="inner-card">
            <div class="ic-label">Performance snapshot — week ending 18 Apr</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px">

              <!-- 1. Productive adherence -->
              <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center">
                <div style="font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;text-align:center">Productive adherence</div>
                <div style="font-size:28px;font-weight:300;font-family:var(--mono);color:var(--amber);letter-spacing:-0.03em;text-align:center">93.3%</div>
                <div style="display:flex;flex-direction:column;gap:4px;margin-top:10px;width:100%">
                  <div style="text-align:center;background:var(--red-bg);border:0.5px solid #f0a0a0;border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;font-family:var(--mono);color:var(--red)">−0.7% vs 94%</div>
                  <div style="text-align:center;background:var(--green-bg);border:0.5px solid #86efac;border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;font-family:var(--mono);color:var(--green)">↑ +0.2% WoW</div>
                </div>
              </div>

              <!-- 2. Total call volume -->
              <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center">
                <div style="font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;text-align:center">Total call volume</div>
                <div style="font-size:28px;font-weight:300;font-family:var(--mono);color:var(--ink);letter-spacing:-0.03em;text-align:center">17,557</div>
                <div style="display:flex;flex-direction:column;gap:4px;margin-top:10px;width:100%">
                  <div style="text-align:center;background:var(--green-bg);border:0.5px solid #86efac;border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;font-family:var(--mono);color:var(--green)">↑ +5.7% WoW</div>
                </div>
              </div>

              <!-- 3. Avg calls per agent -->
              <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center">
                <div style="font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;text-align:center">Avg calls per agent</div>
                <div style="font-size:28px;font-weight:300;font-family:var(--mono);color:var(--ink);letter-spacing:-0.03em;text-align:center">138</div>
                <div style="display:flex;flex-direction:column;gap:4px;margin-top:10px;width:100%">
                  <div style="text-align:center;background:var(--green-bg);border:0.5px solid #86efac;border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;font-family:var(--mono);color:var(--green)">↑ +7.8% WoW</div>
                </div>
              </div>

              <!-- 4. Active agents -->
              <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center">
                <div style="font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;text-align:center">Active agents</div>
                <div style="font-size:28px;font-weight:300;font-family:var(--mono);color:var(--ink);letter-spacing:-0.03em;text-align:center">127</div>
                <div style="display:flex;flex-direction:column;gap:4px;margin-top:10px;width:100%">
                  <div style="text-align:center;background:var(--amber-bg);border:0.5px solid #fcd34d;border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;font-family:var(--mono);color:var(--amber)">↓ −3 WoW</div>
                </div>
              </div>

            </div>
          </div>
          <div class="inner-card" style="margin-top:10px">
            <div class="ic-label">Missed calls — % of total calls &amp; weekly volume</div>

            <!-- % labels row -->
            <div style="display:flex;gap:4px;padding:0 16px;margin-bottom:2px">
              <div style="flex:1;text-align:center;font-size:10px;font-family:var(--mono);font-weight:600;color:var(--ink2)">2.3%</div>
              <div style="flex:1;text-align:center;font-size:10px;font-family:var(--mono);font-weight:600;color:var(--ink2)">3.4%</div>
              <div style="flex:1;text-align:center;font-size:10px;font-family:var(--mono);font-weight:600;color:var(--ink2)">2.3%</div>
              <div style="flex:1;text-align:center;font-size:10px;font-family:var(--mono);font-weight:600;color:var(--ink2)">2.4%</div>
              <div style="flex:1;text-align:center;font-size:10px;font-family:var(--mono);font-weight:600;color:var(--ink2)">3.1%</div>
            </div>

            <!-- volume labels row -->
            <div style="display:flex;gap:4px;padding:0 16px;margin-bottom:4px">
              <div style="flex:1;text-align:center;font-size:9px;color:var(--ink3)">332</div>
              <div style="flex:1;text-align:center;font-size:9px;color:var(--ink3)">550</div>
              <div style="flex:1;text-align:center;font-size:9px;color:var(--ink3)">382</div>
              <div style="flex:1;text-align:center;font-size:9px;color:var(--ink3)">398</div>
              <div style="flex:1;text-align:center;font-size:9px;color:var(--ink3)">548</div>
            </div>

            <!-- bars row -->
            <div style="display:flex;gap:4px;align-items:flex-end;height:52px;padding:0 16px">
              <div style="flex:1;display:flex;justify-content:center;align-items:flex-end;height:100%">

            <div style="font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:2px">Brian Hayes</div>

            <div style="font-size:10px;color:#94a3b8;border-top:0.5px solid #1e1b4b;padding-top:8px;line-height:1.5">Team leads pull this during every 1:1. Shows the <strong style="color:#cbd5e1">whole journey</strong>, not just the last call. "It tells a story about an agent's time with us."</div>

          <div style="font-size:11px;color:#94a3b8;margin-bottom:10px">The same rigour we apply to agents, we apply to how team leads coach. A rubric makes the standard objective, not personal.</div>

            {criteria:'Set measurable expectation with follow-up date',w:'20%',score:null},
            {criteria:'Agent metric improved within 2 weeks',w:'20%',score:null},
          ].map((r,i)=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid #1e1b4b">
            <div style="flex:1;font-size:11px;color:#cbd5e1">${r.criteria}</div>

        <!-- PILLAR 2: RIGOR + PERFORMANCE MGMT FRAMEWORK + OUTLIER -->
        <div class="pillar pillar-rigor">
          <div class="pillar-num" style="color:#f0abfc">02 — Operational rigor</div>
          <div class="pillar-title" style="color:#e2e8f0">Performance Management Framework</div>

          <div class="compare-row compare-now">
            <div class="compare-label now-label">Today</div>

            <div class="compare-label future-label">In 6–8 weeks</div>

            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#1e1b4b;color:#a5b4fc;padding:2px 6px;border-radius:4px;border:0.5px solid #4338ca">Job / Technical</span>
              <span style="font-size:10px;color:#94a3b8">Low–medium impact · 90-day rolloff</span>
            </div>

            <div style="display:flex;gap:4px;flex-wrap:wrap">
              <span style="font-size:9px;color:#86efac;background:#0d1f0d;padding:2px 7px;border-radius:4px;border:0.5px solid #14532d">Verbal</span>
              <span style="font-size:10px;color:#4a5568">→</span>
              <span style="font-size:9px;color:#fcd34d;background:#2d1f07;padding:2px 7px;border-radius:4px;border:0.5px solid #78350f">Written</span>
              <span style="font-size:10px;color:#4a5568">→</span>
              <span style="font-size:9px;color:#fb923c;background:#2d1507;padding:2px 7px;border-radius:4px;border:0.5px solid #7c2d12">Final</span>
              <span style="font-size:10px;color:#4a5568">→</span>
              <span style="font-size:9px;color:#fca5a5;background:#2d0707;padding:2px 7px;border-radius:4px;border:0.5px solid #7f1d1d">Term</span>
            </div>
          </div>

          <div style="background:#0a0a1a;border:0.5px solid #2d1f6e;border-radius:8px;padding:10px 12px;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#1e1b4b;color:#a5b4fc;padding:2px 6px;border-radius:4px;border:0.5px solid #4338ca">Behavioural</span>
              <span style="font-size:10px;color:#fca5a5">No rolloff · lasts duration of employment</span>
            </div>
            <div style="font-size:11px;color:#cbd5e1;line-height:1.5;margin-bottom:8px">Attendance, tardiness, call avoidance (intentional), conduct, tone on calls</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
              <span style="font-size:9px;color:#86efac;background:#0d1f0d;padding:2px 7px;border-radius:4px;border:0.5px solid #14532d">Verbal</span>
              <span style="font-size:10px;color:#4a5568">→</span>
              <span style="font-size:9px;color:#fb923c;background:#2d1507;padding:2px 7px;border-radius:4px;border:0.5px solid #7c2d12">Final</span>
              <span style="font-size:10px;color:#4a5568;font-style:italic">(can skip written)</span>
            </div>
          </div>

          <div style="background:#0a0a1a;border:0.5px solid #2d1f6e;border-radius:8px;padding:10px 12px;margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#2d0707;color:#fca5a5;padding:2px 6px;border-radius:4px;border:0.5px solid #7f1d1d">Compliance</span>
              <span style="font-size:10px;color:#fca5a5">High impact · no rolloff</span>
            </div>
            <div style="font-size:11px;color:#cbd5e1;line-height:1.5;margin-bottom:8px">HIPPA violations, patient verification failures, OSI non-reporting, protected health data handling</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
              <span style="font-size:9px;color:#fca5a5;background:#2d0707;padding:2px 7px;border-radius:4px;border:0.5px solid #7f1d1d">Final</span>
              <span style="font-size:10px;color:#4a5568">or</span>
              <span style="font-size:9px;color:#fca5a5;background:#2d0707;padding:2px 7px;border-radius:4px;border:0.5px solid #7f1d1d">Immediate term</span>
              <span style="font-size:10px;color:#4a5568;font-style:italic">(case by case)</span>
            </div>
          </div>

          <div style="height:0.5px;background:#2d1f6e;margin:14px 0"></div>

          <!-- OUTLIER FRAMEWORK -->
          <div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#f0abfc;margin-bottom:8px">Outlier management · framework in action</div>
          <div class="outlier-row">
            <span class="outlier-tag tag-risk">At risk</span>
            <div>
              <div class="outlier-name">Jordan Gibson</div>
              <div class="outlier-detail">Job/Technical · 4th occurrence transfers · Final warning · next step = Term</div>

          <div class="outlier-row">

              <div class="outlier-detail">Cleared 1st occurrence &gt;90 days ago · Resets clean under rolloff rule</div>
            </div>
          </div>
        </div>

        <!-- PILLAR 3: AGENT VOICE -->
        <div class="pillar pillar-ideation">
          <div class="pillar-num" style="color:#fdba74">03 — Agent Voice</div>
          <div class="pillar-title" style="color:#e2e8f0">The feedback loop</div>
          <div class="pillar-sub">A management system only works if it stays connected to what agents actually experience. This is how we stay honest — themed, focused listening that feeds directly into how we coach and what we set as the standard.</div>

          <div class="compare-row compare-now">
            <div class="compare-label now-label">Today</div>
            <div class="compare-text">Public service announcements for obvious trends. Open feedback when it surfaces naturally. No structured mechanism to capture the signal from the floor.</div>
          </div>
          <div class="compare-row compare-future">
            <div class="compare-label future-label">In 6–8 weeks</div>
            <div class="compare-text">Weekly themed question every Monday. Team leads capture responses. Ops manager synthesises Friday. Top findings feed into next week's coaching focus and — when needed — into the PM framework itself. Agents see their input shape what happens next.</div>

          <div style="padding:8px 10px;border-radius:6px;background:#1a0f07;border:0.5px solid #78350f;margin-bottom:6px">

            <div style="font-size:11px;color:#d1d5db">"${t.theme}"</div>
          </div>`).join('')}
        </div>

      </div>`
  }
];

let current = 0;
const names = STATIONS.map(s => s.shortLabel);

function renderProgress() {
  const track = document.getElementById('progressTrack');
  const labels = document.getElementById('stationLabels');
  track.innerHTML = '';
  labels.innerHTML = '';
  STATIONS.forEach((s, i) => {
    const seg = document.createElement('div');
    let cls = 'progress-seg';
    if (i < current) cls += s.future ? ' done' : ' done';
    else if (i === current) cls += s.future ? ' future active' : ' active';
    else if (s.future) cls += ' future';
    seg.className = cls;
    seg.onclick = () => { current = i; render(); };
    track.appendChild(seg);

    const lbl = document.createElement('div');
    let lcls = 'station-lbl';
    if (s.future) lcls += ' future-lbl';
    if (i < current) lcls += ' done';
    else if (i === current) lcls += ' active';
    lbl.className = lcls;
    lbl.textContent = names[i];
    lbl.onclick = () => { current = i; render(); };
    labels.appendChild(lbl);
  });
}

function render() {
  renderProgress();
  const s = STATIONS[current];
  const card = document.getElementById('stationCard');
  card.className = 'station-card' + (s.future ? ' future-card' : '');
  card.innerHTML = `
    <div class="st-header">
      <div style="flex:1">
        <div class="st-eyebrow">${s.eyebrow}</div>
        <div class="st-title">${s.title}</div>
        <div class="st-desc">${s.desc}</div>
      </div>
      <div class="st-icon" style="margin-left:20px;flex-shrink:0">${s.icon}</div>
    </div>
    ${s.render()}`;

  document.getElementById('footerStation').textContent = `${current + 1} of ${STATIONS.length}`;
  document.getElementById('btnBack').disabled = current === 0;

  const btnNext = document.getElementById('btnNext');
  if (current === STATIONS.length - 1) {
    btnNext.textContent = '↺ Start over';
    btnNext.className = 'btn btn-ghost';
    btnNext.onclick = () => { current = 0; render(); };
  } else {
    const nextIsFuture = STATIONS[current + 1]?.future;
    btnNext.className = 'btn ' + (nextIsFuture ? 'btn-future' : 'btn-primary');
    btnNext.textContent = nextIsFuture ? 'Future state →' : 'Next →';
    btnNext.onclick = () => go(1);
  }
}

function go(dir) {
  current = Math.max(0, Math.min(STATIONS.length - 1, current + dir));
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', {weekday:'short',year:'numeric',month:'short',day:'numeric'});
render();
</script>
