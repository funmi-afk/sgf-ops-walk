<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lilly PCR — Attendance Watch, WTD Jul 6–8 2026</title>
<style>
:root{
  --ink:#12161c; --paper:#f6f4ef; --panel:#fffdf9; --line:#e2ddd2; --muted:#6b6659;
  --ncns:#b0281f; --sda:#c9791f; --ot:#7a6a3a; --tech:#4a6b7a; --early:#9a5b8a; --late:#8a7a2a;
  --crisis:#b0281f; --warn:#c9791f; --ok:#3a7a55;
  --band:#efe9dd; --shadow:0 1px 0 rgba(0,0,0,.04);
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  -webkit-font-smoothing:antialiased;line-height:1.45}
.wrap{max-width:1180px;margin:0 auto;padding:28px 22px 80px}
.mono{font-family:"SFMono-Regular",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace}
header.top{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:6px}
.kicker{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
h1{font-size:30px;margin:6px 0 2px;font-weight:600;letter-spacing:-.01em}
.sub{color:var(--muted);font-size:14px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin:14px 0 22px;font-size:12px;font-family:ui-monospace,monospace;color:var(--muted)}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
.tabs{display:flex;gap:2px;margin-bottom:0;border-bottom:2px solid var(--ink)}
.tab{appearance:none;border:1px solid var(--line);border-bottom:none;background:var(--band);
  padding:10px 18px 9px;font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;color:var(--muted);border-radius:6px 6px 0 0;position:relative;top:2px}
.tab[aria-selected=true]{background:var(--panel);color:var(--ink);border-color:var(--ink);border-bottom:2px solid var(--panel);font-weight:700}
.tab .n{font-size:11px;opacity:.7;margin-left:6px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);margin:22px 0 8px}
.kpi{background:var(--panel);padding:14px 16px}
.kpi .lab{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.kpi .val{font-size:30px;font-weight:600;letter-spacing:-.02em;margin-top:3px}
.kpi .val small{font-size:14px;color:var(--muted);font-weight:400}
.section-label{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--muted);margin:30px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
/* TL bars */
.tl-row{display:grid;grid-template-columns:170px 1fr 46px;gap:12px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
.tl-row .name{font-size:14px;font-weight:600}
.tl-row .name .team{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);font-weight:400}
.bar{display:flex;height:22px;border-radius:3px;overflow:hidden;background:var(--band)}
.bar span{display:block;height:100%}
.bar-c-NCNS{background:var(--ncns)} .bar-c-SDA{background:var(--sda)} .bar-c-OTMissed{background:var(--ot)}
.bar-c-Tech{background:var(--tech)} .bar-c-Early{background:var(--early)} .bar-c-Late{background:var(--late)}
.tl-row .rate{text-align:right;font-family:ui-monospace,monospace;font-size:13px;font-weight:700}
.tl-row .rate.hi{color:var(--crisis)} .tl-row .rate.mid{color:var(--warn)} .tl-row .rate.lo{color:var(--ok)}
.hint{font-size:12.5px;color:var(--muted);margin:8px 0 0;font-style:italic}
/* agent table */
table{width:100%;border-collapse:collapse;margin-top:6px}
th{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);text-align:left;padding:8px 10px;border-bottom:2px solid var(--ink);position:sticky;top:0;background:var(--paper);cursor:pointer;user-select:none}
th.num,td.num{text-align:right}
th .arr{opacity:.4;font-size:9px}
td{padding:9px 10px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tr.chronic td{background:linear-gradient(90deg,rgba(176,40,31,.06),transparent 60%)}
.agent-name{font-weight:600}
.pill{display:inline-block;font-family:ui-monospace,monospace;font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:3px;margin-left:7px;letter-spacing:.04em;vertical-align:middle}
.pill.rpt{background:#f3e2c2;color:#7a531a}
.pill.chr{background:var(--crisis);color:#fff}
.pill.off{background:#4a4a4a;color:#fff}
.pill.ntl{background:#2f5d8a;color:#fff}
tr.offb td{opacity:.62}
tr.offb td:first-child{opacity:1}
.tag-off{font-family:ui-monospace,monospace;font-size:10px;color:var(--muted)}
.tl-cell{font-size:12.5px;color:var(--muted)}
.chips{display:flex;gap:3px;flex-wrap:wrap}
.chip{font-family:ui-monospace,monospace;font-size:10px;padding:1px 5px;border-radius:3px;color:#fff;white-space:nowrap}
.chip-NCNS{background:var(--ncns)} .chip-SDA{background:var(--sda)} .chip-OTMissed{background:var(--ot)}
.chip-Tech{background:var(--tech)} .chip-Early{background:var(--early)} .chip-Late{background:var(--late)}
.spark{font-family:ui-monospace,monospace;font-size:12px;color:var(--muted)}
.wtd-n{font-family:ui-monospace,monospace;font-weight:700;font-size:15px}
.hist-n{font-family:ui-monospace,monospace;font-size:13px}
.hist-n.recent{color:var(--crisis);font-weight:700}
.hrs{font-family:ui-monospace,monospace;font-weight:700;font-size:14px}
.pct{font-family:ui-monospace,monospace;font-weight:700;font-size:13px}
.pct.hi{color:var(--crisis)} .pct.mid{color:var(--warn)} .pct.lo{color:var(--ok)}
.hist-peak{font-family:ui-monospace,monospace;font-size:12px;color:var(--crisis);font-weight:700}
.controls{display:flex;gap:14px;align-items:center;margin:18px 0 4px;flex-wrap:wrap}
.controls label{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer}
.controls select{font-family:ui-monospace,monospace;font-size:12px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;background:var(--panel)}
.controls input[type=search]{font-family:ui-monospace,monospace;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:5px;background:var(--panel);min-width:190px}
.note{font-size:12px;color:var(--muted);margin-top:26px;padding-top:14px;border-top:1px solid var(--line);line-height:1.6}
.hidden{display:none!important}
@media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr)}.tl-row{grid-template-columns:120px 1fr 40px}
  th.hidecol,td.hidecol{display:none}.wrap{padding:18px 12px 60px}}
</style></head>

e_sched_hrs":40.0,"active_pct":2.5,"rate":100.0}]}}};
const TYPES=['NCNS','SDA','OTMissed','Tech','Early','Late'];
const TYPE_LABEL={NCNS:'NCNS',SDA:'Same-Day',OTMissed:'OT Missed',Tech:'Tech',Early:'Early',Late:'Late'};
const order=['SA','LAGOS','MO','GASTRO'];
let cur='SA', sortKey='missed_hrs', sortDir=-1, onlyFlagged=false, hideOff=false, histWin='jan', q='';

const tabs=document.getElementById('tabs');
order.forEach(s=>{
  const d=DATA.sites[s];
  const b=document.createElement('button');
  b.className='tab';b.setAttribute('role','tab');
  b.setAttribute('aria-selected', s===cur);
  b.innerHTML=d.label+' <span class="n">'+d.n_offenders+'/'+d.n_agents+'</span>';
  b.onclick=()=>{cur=s;[...tabs.children].forEach(c=>c.setAttribute('aria-selected',false));b.setAttribute('aria-selected',true);render();};
  tabs.appendChild(b);
});

function barSeg(bytype,total){
  return TYPES.filter(t=>bytype[t]).map(t=>{
    const w=(bytype[t]/total*100).toFixed(1);
    return '<span class="bar-c-'+t+'" style="width:'+w+'%" title="'+TYPE_LABEL[t]+': '+bytype[t]+'"></span>';
  }).join('');
}
function chips(bytype){
  return '<div class="chips">'+TYPES.filter(t=>bytype[t]).map(t=>
    '<span class="chip chip-'+t+'">'+TYPE_LABEL[t]+' '+bytype[t]+'</span>').join('')+'</div>';
}
function winCell(a,w){
  if(!a.hist || !a.hist[w]) return '<span class="spark">—</span>';
  const H=a.hist[w];
  if(!H.total) return '<span class="spark">—</span>';
  const parts=TYPES.filter(t=>H.bytype[t]).map(t=>TYPE_LABEL[t]+' '+H.bytype[t]);
  let cls='hist-n';
  if(w==='apr'){
    const j=a.hist.jan? a.hist.jan.total:0;
    if(j && H.total/j>=0.6) cls='hist-n recent';   // most of the record is recent
  }
  return '<span class="'+cls+'" title="'+parts.join(' · ')+'">'+H.total+'</span>'+
         '<span class="spark"> · pk'+H.peak+'</span>';
}
function histSpark(a){
  const H=HW(a);
  if(!H || !H.total) return '<span class="spark">—</span>';
  const parts=TYPES.filter(t=>H.bytype[t]).map(t=>TYPE_LABEL[t]+' '+H.bytype[t]);
  return '<span class="hist-n" title="'+parts.join(' · ')+'">'+H.total+'</span> '+
         '<span class="spark">/ '+H.months+'mo</span>';
}

function render(){
  const d=DATA.sites[cur];
  // KPIs
  const flaggedTypes={};TYPES.forEach(t=>flaggedTypes[t]=d.bytype[t]||0);
  const topType=Object.entries(d.bytype).sort((a,b)=>b[1]-a[1])[0]||['—',0];
  const repeats=d.agents.filter(a=>a.repeat_flag).length;
  const chronic=d.agents.filter(a=>isChronic(a)).length;
  let html='<div class="kpis">'+
    kpi('Agents w/ ≥1 event',d.n_offenders,'of '+d.n_agents+' scheduled')+
    kpi('Hours missed',fmtH(hideOff?d.active_missed_hrs:d.missed_hrs),'of '+fmtH(hideOff?d.active_sched_hrs:d.sched_hrs)+' scheduled')+
    kpi('% of scheduled hrs',((hideOff?d.active_pct:d.missed_pct)==null?'—':(hideOff?d.active_pct:d.missed_pct)+'%'),(hideOff?'active agents only':'unapproved absence'))+
    kpi('Chronic core',chronic,'≥9 in a month, '+(histWin==='apr'?'Apr–now':'Jan–now'))+
  '</div>';
  html+='<p class="hint">Largest bucket this week: <b>'+TYPE_LABEL[topType[0]]+'</b> ('+topType[1]+' events). '+
    (cur==='SA'?'Cape Town stays NCNS-dominated — 210 of its 312 events — the behaviour its policy governs loosely.':
     cur==='LAGOS'?'Lagos stays low-rate; Same-Day is its main bucket.':
     cur==='MO'?'Missouri is Same-Day-led across the full week.':     'Gastro sits at 8.5% of scheduled hours — above Lagos, well below Cape Town; per-agent history is available here.')+'</p>';

  // TL section
  html+='<div class="section-label">Team-lead contribution · '+cur+' · ranked by events this week</div>';
  const HK=hideOff?'active_missed_hrs':'missed_hrs', PK=hideOff?'active_pct':'missed_pct';
  const useH=d.tls.some(t=>t[HK]!=null);
  const maxEv=Math.max(...d.tls.map(t=>useH?(t[HK]||0):t.events),1);
  d.tls.forEach(t=>{
    const w=((useH?(t[HK]||0):t.events)/maxEv*100).toFixed(1);
    html+='<div class="tl-row"><div class="name">'+t.tl+
      ' <span class="team">· '+t.offenders+'/'+t.team+(t.missed_hrs!=null?' · '+fmtH(t.missed_hrs):'')+'</span></div>'+
      '<div class="bar" style="width:'+Math.max(w,4)+'%">'+barSeg(t.bytype,t.events)+'</div>'+
      '<div class="rate '+pctCls(t.missed_pct)+'">'+(t.missed_pct==null?t.rate:t.missed_pct)+'%</div></div>';
  });
  html+='<p class="hint">Bar width = hours lost; segments = absence type. % = share of the team’s <b>scheduled hours</b> lost to unapproved absence.</p>';

  // controls + agent table
  html+='<div class="controls">'+
    '<input type="search" id="q" placeholder="filter agent / TL…" value="'+q.replace(/"/g,'&quot;')+'">'+
    '<label><input type="checkbox" id="flag" '+(onlyFlagged?'checked':'')+'> repeat / chronic only</label>'+
    (d.n_offboarded?'<label><input type="checkbox" id="hoff" '+(hideOff?'checked':'')+'> exclude offboarded ('+d.n_offboarded+')</label>':'')+

    '</div>';
  html+='<table><thead><tr>'+
    th('Agent','name')+th('Team lead','tl','hidecol')+
    th('Events','wtd','num')+th('Hrs missed','missed_hrs','num')+th('% sched','missed_pct','num')+
    '<th class="hidecol">This week</th>'+
    th('Jan–now','hist_jan','num')+th('Apr–now','hist_apr','num')+th('Peak/mo','hist_peak','num hidecol')+
    '</tr></thead><tbody id="tb"></tbody></table>';

  document.getElementById('panel').innerHTML=html;
  document.getElementById('q').addEventListener('input',e=>{q=e.target.value;fillRows();});
  document.getElementById('flag').addEventListener('change',e=>{onlyFlagged=e.target.checked;fillRows();});
  var ho=document.getElementById('hoff');
  if(ho) ho.addEventListener('change',e=>{hideOff=e.target.checked;render();});

  document.querySelectorAll('th[data-k]').forEach(h=>h.onclick=()=>{
    const k=h.dataset.k; if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='name'||k==='tl')?1:-1;}
    fillRows();
  });
  fillRows();
  document.getElementById('note').innerHTML=
    'Window: '+DATA.window+' — a full seven-day week, so counts are substantially higher than the earlier three-day snapshot; the <b>Jan–now</b> column still identifies the chronic core. '+'Note: sites are assigned by each agent’s roster workflow rather than by tab label (earlier exports had MO/Lagos transposed; this one also mixes 23 Lagos agents into the MO tab). All four sites now cover the same Jul 6–12 week. '+
    'Per-agent Jan–now history exists for Cape Town and Gastro; Lagos and Missouri have only site-level monthly history, so their Jan–now shows as —. '+
    'Agents not found in the roster export are labelled <span class="mono">Unmapped</span> and still counted. '+
    '<b>Hours missed</b> counts each absent slot once (this export uses 1-hour slots; a full 5×8h week = 40h) (approved leave — bereavement, LOA, PTO — is excluded from missed but still counted as scheduled). <b>% sched</b> = missed ÷ that person’s own scheduled hours, so part-timers are compared fairly. <b>Chronic</b> = a month with ≥9 events since January. <b>Jan–now</b> and <b>Apr–now</b> show unapproved events over each window with that window’s worst month (pk). An <span class="mono" style="color:var(--crisis);font-weight:700">Apr–now figure in red</span> means ≥60% of the agent’s record since January happened in the last three months — a problem that is still live, not historic. <b>OFFBOARDED</b> marks agents you identified as having left — 17 in Cape Town (512h, 34% of its lost hours; excluding them drops the site from 18.7% to 13.5%) Glen Masindi in Gastro (0 hours lost this week, but chronic on history), and 9 in Missouri (346h, 41% of its lost hours; excluding them drops the site from 14.8% to 9.3%). David Holmes, also named as offboarded from Missouri, does not appear in this week’s roster or the employee list, so he is not tagged. <b>NEW TL</b> marks Kamber Hawkins — newly appointed in Missouri with no team members yet, so she still shows as an agent under Sean Lockmon in the roster. Four names on your list (Salem Ellington, Romy Achut, Fallon Langford, Milan Sinclair) do not appear in this week’s roster.';
}
function HW(a){ // history block for the selected window, falling back to jan
  if(!a.hist) return {total:a.hist_total||0,bytype:a.hist_bytype||{},peak:a.hist_peak||0,months:a.hist_months||0};
  var b=a.hist[histWin]; return b|| a.hist.jan || {total:0,bytype:{},peak:0,months:0};
}
function isChronic(a){ return histWin==='apr' ? (a.chronic_apr===true) : (a.chronic_flag===true); }
function fmtH(x){ if(x===undefined||x===null) return '\u2014'; return (Math.round(x*10)/10).toLocaleString()+'h'; }
function pctCls(p){ if(p==null) return 'lo'; return p>=25?'hi':p>=10?'mid':'lo'; }
function kpi(l,v,s){return '<div class="kpi"><div class="lab">'+l+'</div><div class="val">'+v+' <small>'+s+'</small></div></div>';}
function th(l,k,extra){return '<th data-k="'+k+'" class="'+(extra||'')+'">'+l+' <span class="arr">'+(sortKey===k?(sortDir<0?'▼':'▲'):'')+'</span></th>';}

function fillRows(){
  const d=DATA.sites[cur];
  let rows=d.agents.slice();
  if(hideOff) rows=rows.filter(a=>!a.offboarded);
  if(onlyFlagged) rows=rows.filter(a=>a.repeat_flag||isChronic(a));
  if(q){const s=q.toLowerCase();rows=rows.filter(a=>a.name.toLowerCase().includes(s)||a.tl.toLowerCase().includes(s));}
  rows.sort((a,b)=>{
    let x,y;
    if(sortKey==='hist_jan'){x=(a.hist&&a.hist.jan?a.hist.jan.total:0);y=(b.hist&&b.hist.jan?b.hist.jan.total:0);}
    else if(sortKey==='hist_apr'){x=(a.hist&&a.hist.apr?a.hist.apr.total:0);y=(b.hist&&b.hist.apr?b.hist.apr.total:0);}
    else if(sortKey==='hist_total'){x=HW(a).total;y=HW(b).total;}
    else if(sortKey==='hist_peak'){x=HW(a).peak;y=HW(b).peak;}
    else {x=a[sortKey];y=b[sortKey];}
    if(typeof x==='string'||typeof y==='string'){return String(x||'').localeCompare(String(y||''))*sortDir;}
    return ((x==null?-1:x)-(y==null?-1:y))*sortDir;
  });
  const tb=document.getElementById('tb');
  tb.innerHTML=rows.map(a=>{
    const CH=isChronic(a);
    const pills=(a.offboarded?'<span class="pill off">OFFBOARDED</span>':'')+
                (a.new_tl?'<span class="pill ntl">NEW TL</span>':'')+
                (CH?'<span class="pill chr">CHRONIC</span>':'')+
                (a.repeat_flag&&!CH?'<span class="pill rpt">REPEAT</span>':'');
    return '<tr class="'+(CH?'chronic ':'')+(a.offboarded?'offb':'')+'">'+
      '<td><span class="agent-name">'+a.name+'</span>'+pills+'</td>'+
      '<td class="tl-cell hidecol">'+a.tl+'</td>'+
      '<td class="num"><span class="wtd-n">'+(a.wtd||'·')+'</span></td>'+
      '<td class="num"><span class="hrs">'+(a.missed_hrs?fmtH(a.missed_hrs):'·')+'</span></td>'+
      '<td class="num">'+(a.sched_hrs?'<span class="pct '+pctCls(a.missed_pct)+'">'+a.missed_pct+'%</span>'+
          '<span class="spark"> of '+fmtH(a.sched_hrs)+'</span>':'—')+'</td>'+
      '<td class="hidecol">'+(a.wtd?chips(a.wtd_bytype):'<span class="spark">—</span>')+'</td>'+
      '<td class="num">'+winCell(a,'jan')+'</td>'+
      '<td class="num">'+winCell(a,'apr')+'</td>'+
      '<td class="num hidecol">'+(HW(a).peak?'<span class="hist-peak">'+HW(a).peak+'</span>':'—')+'</td>'+
    '</tr>';
  }).join('') || '<tr><td colspan="9" style="color:var(--muted);padding:20px">No agents match.</td></tr>';
}
render();
</script>
